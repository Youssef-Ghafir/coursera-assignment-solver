<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Quieter, tinted neutral background */
      --background: #f8fafc;
      --card: #ffffff;
      
      /* Bolder text */
      --foreground: #0f172a;
      --muted: #64748b;
      
      /* Semantic Colorize */
      --primary: #2563eb;       /* Electric Blue */
      --primary-hover: #1d4ed8;
      --secondary: #e2e8f0;     /* Muted secondary */
      --secondary-text: #475569;
      --accent: #f59e0b;        /* Amber for power action */
      --accent-hover: #d97706;
      --border: #e2e8f0;
      
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #0f172a;
        --card: #1e293b;
        --foreground: #f8fafc;
        --muted: #94a3b8;
        --primary: #3b82f6;
        --primary-hover: #60a5fa;
        --secondary: #334155;
        --secondary-text: #e2e8f0;
        --accent: #f59e0b;
        --accent-hover: #fbbf24;
        --border: #334155;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      padding: 24px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--background);
      color: var(--foreground);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Quieter title, bold weight, extreme scale */
    .header {
      margin-bottom: 4px;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 4px;
      color: var(--foreground);
      letter-spacing: -0.03em;
    }
    
    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.4;
    }

    /* Arrange: Grouped sections instead of monotonous cards */
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .section:last-of-type {
      border-bottom: none;
      padding-bottom: 4px;
    }

    .section-header {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .section-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Inputs */
    .input-group {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background-color: var(--card);
      padding: 0 12px;
      font-size: 0.85rem;
      font-family: inherit;
      color: var(--foreground);
      transition: all 0.2s ease;
      min-width: 0;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    
    input::placeholder {
      color: var(--muted);
      opacity: 0.7;
    }

    /* Buttons: Semantic coloring, quieter effects, bold purpose */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      height: 38px;
      padding: 0 16px;
      cursor: pointer;
      width: 100%;
      border: none;
      transition: all 0.15s ease-out;
    }
    
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background-color: var(--primary);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }

    .btn-accent {
      background-color: var(--accent);
      color: #fff;
    }
    .btn-accent:hover:not(:disabled) { background-color: var(--accent-hover); }

    .btn-secondary {
      background-color: var(--secondary);
      color: var(--secondary-text);
      font-weight: 600;
    }
    .btn-secondary:hover:not(:disabled) { opacity: 0.8; }
    
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Utilities */
    .meta-row {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }

    #status {
      font-size: 0.75rem;
      color: #10b981; 
      font-weight: 500;
    }

    .link {
      font-size: 0.7rem; 
      color: var(--primary); 
      text-decoration: none; 
      font-weight: 600;
    }
    .link:hover { text-decoration: underline; }

    #result {
      font-size: 0.8rem;
      line-height: 1.5;
      padding: 12px;
      border-radius: var(--radius-sm);
      background-color: var(--card);
      border: 1px solid var(--border);
      color: var(--foreground);
      display: none;
      max-height: 150px;
      overflow-y: auto;
    }

    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      font-weight: 500;
    }

    .footer a {
      color: var(--foreground);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }
    
    .footer a:hover { 
      color: var(--primary);
    }
    
    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background-color: var(--secondary);
      border-radius: 12px;
      color: var(--foreground) !important;
    }
    .update-badge:hover {
      background-color: var(--border);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="title">Auto Solver</h1>
    <p class="subtitle">Speedrun your courses efficiently.</p>
  </div>

  <div class="section">
    <div class="section-header" style="margin-bottom: 4px;">
      <span class="section-title">API Setup</span>
    </div>
    <div class="input-group">
      <input type="password" id="apiKeyInput" placeholder="Gemini API Key" autocomplete="off">
      <button id="saveBtn" class="btn btn-secondary" style="width: auto;">Save</button>
    </div>
    <div class="meta-row">
      <div id="status"></div>
      <a href="https://ai.google.dev/aistudio" target="_blank" class="link">Get Free Key →</a>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Smart Quiz Solver</span>
      <span class="section-desc">Automatically solve assignments using AI.</span>
    </div>
    <button id="explainBtn" class="btn btn-primary">Solve Current Quiz</button>
    <button id="showQuestionsBtn" class="btn btn-secondary">Copy Questions Only</button>
    <div id="result"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Media Automation</span>
      <span class="section-desc">Instantly complete videos and readings.</span>
    </div>
    <button id="completeVideosBtn" class="btn btn-accent">Complete Materials</button>
  </div>

  <div class="footer">
    <span>created by <a href="https://github.com/Youssef-Ghafir" target="_blank">YG</a></span>
    <a href="https://github.com/Youssef-Ghafir/coursera-assignment-solver" target="_blank" class="update-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Check for updates
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
